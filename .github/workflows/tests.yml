name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --group dev --python ${{ matrix.python-version }}

      - name: Check formatting
        run: uv run ruff format --check czso tests

      - name: Lint
        run: uv run ruff check czso tests

      - name: Typecheck
        run: uv run ty check czso tests

      - name: Run tests
        run: uv run pytest czso tests
